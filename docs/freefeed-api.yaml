# FreeFeed API Reference
#
# Structured endpoint catalog for the FreeFeed API Explorer.
# Generated from FreeFeed server's app-tokens-scopes.ts.
#
# Endpoints sorted by: path ascending, then method GET > POST > PUT > PATCH > DELETE

meta:
  server_repo: FreeFeed/freefeed-server
  server_branch: stable
  server_rev: 1e19100b81e2fba04ab176e6d80268c6556b6f2b
  synced_at: '2026-04-06'
  total_endpoints: 145
  format_version: 1
endpoints:
- method: GET
  path: /v2/allGroups
  description: Get list of all groups.
  auth_required: true
  scopes:
  - read-feeds
  parameters: []
- method: GET
  path: /v2/app-tokens
  description: List current user's app tokens.
  auth_required: true
  scopes:
  - session-only
  parameters: []
- method: POST
  path: /v2/app-tokens
  description: Create a new app token.
  auth_required: true
  scopes:
  - session-only
  parameters:
  - name: title
    location: body
    type: string
    required: true
    description: Token title (1-250 chars, non-whitespace)
  - name: scopes
    location: body
    type: string[]
    required: false
    description: 'Access scopes (default: [])'
  - name: expiresAt
    location: body
    type: number or string
    required: false
    description: Expiry as Unix timestamp or ISO 8601 datetime
  - name: restrictions
    location: body
    type: object
    required: true
    description: 'Access restrictions (default: {origins: [], netmasks: []})'
  - name: restrictions.origins
    location: body
    type: string[]
    required: false
    description: 'Allowed origin URLs (default: [])'
  - name: restrictions.netmasks
    location: body
    type: string[]
    required: false
    description: 'Allowed IP netmasks (default: [])'
- method: PUT
  path: /v2/app-tokens/:tokenId
  description: Update an app token's title.
  auth_required: true
  scopes:
  - session-only
  parameters:
  - name: tokenId
    location: path
    type: string
    required: true
    description: App token ID
  - name: title
    location: body
    type: string
    required: true
    description: Updated title (1-250 chars, non-whitespace)
- method: DELETE
  path: /v2/app-tokens/:tokenId
  description: Deactivate (delete) an app token.
  auth_required: true
  scopes:
  - session-only
  parameters:
  - name: tokenId
    location: path
    type: string
    required: true
    description: App token ID
- method: POST
  path: /v2/app-tokens/:tokenId/reissue
  description: Regenerate a specific app token.
  auth_required: true
  scopes:
  - session-only
  parameters:
  - name: tokenId
    location: path
    type: string
    required: true
    description: App token ID
- method: POST
  path: /v2/app-tokens/activate
  description: Activate an app token using activation code.
  auth_required: true
  scopes:
  - session-only
  parameters:
  - name: activationCode
    location: body
    type: string
    required: true
    description: Activation code
- method: GET
  path: /v2/app-tokens/current
  description: Get the current app token (when authenticated via app token).
  auth_required: true
  scopes:
  - any
  parameters: []
- method: POST
  path: /v2/app-tokens/current/reissue
  description: Regenerate the current app token.
  auth_required: true
  scopes:
  - any
  parameters: []
- method: GET
  path: /v2/app-tokens/scopes
  description: Get list of available token scopes and their descriptions.
  auth_required: false
  scopes:
  - session-only
  parameters: []
- method: GET
  path: /v2/archives-stats
  description: Get archive restoration statistics.
  auth_required: false
  scopes:
  - session-only
  parameters: []
- method: PUT
  path: /v2/archives/activities
  description: Start activity restoration from archive.
  auth_required: true
  scopes:
  - session-only
  parameters:
  - name: restore
    location: body
    type: boolean
    required: true
    description: Must be `true`
- method: GET
  path: /v2/archives/post-by-old-name/:name
  description: Look up a post by its old FriendFeed name/URL.
  auth_required: true
  scopes:
  - read-feeds
  parameters:
  - name: name
    location: path
    type: string
    required: true
    description: Old FriendFeed post name
- method: POST
  path: /v2/archives/restoration
  description: Start FriendFeed archive restoration.
  auth_required: true
  scopes:
  - session-only
  parameters:
  - name: disable_comments
    location: body
    type: boolean
    required: false
    description: 'Disable comments on restored posts (default: false)'
  - name: via_restore
    location: body
    type: string[]
    required: false
    description: 'Via sources for restoration (default: [])'
- method: POST
  path: /v2/attachments
  description: Upload a new attachment (file).
  auth_required: true
  scopes:
  - manage-posts
  parameters: []
- method: GET
  path: /v2/attachments/:attId
  description: Get attachment metadata by ID.
  auth_required: true
  scopes:
  - read-feeds
  parameters:
  - name: attId
    location: path
    type: UUID
    required: true
    description: Attachment ID
- method: GET
  path: /v2/attachments/:attId/:type
  description: Get attachment preview/variant in specific format.
  auth_required: true
  scopes:
  - read-feeds
  parameters:
  - name: attId
    location: path
    type: UUID
    required: true
    description: Attachment ID
  - name: type
    location: path
    type: string
    required: true
    description: 'Variant type: `original`, `image`, `video`, `audio`'
  - name: format
    location: query
    type: string
    required: false
    description: 'Image format: `webp`, `jpeg`, `avif`'
  - name: width
    location: query
    type: integer
    required: false
    description: Desired width (positive)
  - name: height
    location: query
    type: integer
    required: false
    description: Desired height (positive)
  - name: redirect
    location: query
    type: flag
    required: false
    description: Redirect to file URL
  - name: download
    location: query
    type: flag
    required: false
    description: Force download disposition
- method: POST
  path: /v2/attachments/byIds
  description: Get multiple attachments by their IDs.
  auth_required: true
  scopes:
  - read-feeds
  parameters:
  - name: ids
    location: body
    type: UUID[]
    required: true
    description: Array of attachment IDs (unique)
- method: GET
  path: /v2/attachments/my
  description: List current user's uploaded attachments.
  auth_required: true
  scopes:
  - read-my-files
  parameters:
  - name: limit
    location: query
    type: integer
    required: false
    description: 'Max results (default: 30, max: 100)'
  - name: page
    location: query
    type: integer
    required: false
    description: 'Page number (default: 1)'
- method: POST
  path: /v2/attachments/my/sanitize
  description: Sanitize metadata of uploaded files (strip EXIF etc.).
  auth_required: true
  scopes:
  - manage-my-files
  parameters: []
- method: GET
  path: /v2/attachments/my/stats
  description: Get upload statistics for current user.
  auth_required: true
  scopes:
  - read-my-files
  parameters: []
- method: GET
  path: /v2/bestof
  description: Get best-of posts (most liked).
  auth_required: true
  scopes:
  - read-feeds
  parameters:
  - name: offset
    location: query
    type: integer
    required: false
    description: 'Number of posts to skip (default: 0)'
  - name: limit
    location: query
    type: integer
    required: false
    description: 'Max posts to return (default: 30, max: 120)'
- method: POST
  path: /v2/bookmarklet
  description: Create a post from bookmarklet data.
  auth_required: true
  scopes:
  - manage-posts
  parameters:
  - name: title
    location: body
    type: string
    required: true
    description: Post body text (min 1 char, non-whitespace)
  - name: comment
    location: body
    type: string
    required: false
    description: 'Optional comment text (default: '''')'
  - name: images
    location: body
    type: string[]
    required: false
    description: 'Image URLs (default: [])'
  - name: image
    location: body
    type: string
    required: false
    description: 'Single image URL (default: '''')'
  - name: meta.feeds
    location: body
    type: string or string[]
    required: false
    description: 'Destination feed names (default: [])'
- method: GET
  path: /v2/calendar/:username/:year
  description: Get days with posts in a given year.
  auth_required: true
  scopes:
