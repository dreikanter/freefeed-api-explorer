- method: GET
  path: /v2/calendar/:username/:year/:month/:day
  description: Get posts for a specific date.
  auth_required: true
  scopes:
  - read-feeds
  parameters:
  - name: username
    location: path
    type: string
    required: true
    description: Username
  - name: year
    location: path
    type: integer
    required: true
    description: Year
  - name: month
    location: path
    type: integer
    required: true
    description: Month (1-12)
  - name: day
    location: path
    type: integer
    required: true
    description: Day (1-31)
  - name: offset
    location: query
    type: integer
    required: false
