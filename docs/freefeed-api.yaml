- method: GET
  path: /v2/everything
  description: Get all public posts across the site.
  auth_required: true
  scopes:
  - read-feeds
  parameters: []
- method: POST
  path: /v2/ext-auth/auth-finish
  description: Complete external authentication flow.
  auth_required: true
  scopes:
  - session-only
  parameters:
  - name: provider
    location: body
    type: string
    required: true
    description: Auth provider name (max 50 chars)
  - name: query
    location: body
    type: object
    required: true
    description: OAuth callback query parameters
- method: POST
  path: /v2/ext-auth/auth-start
  description: Start external authentication flow (OAuth).
  auth_required: true
  scopes:
  - session-only
  parameters:
  - name: provider
    location: body
    type: string
    required: true
    description: Auth provider name (max 50 chars)
  - name: redirectURL
    location: body
    type: string
    required: true
    description: Callback URL (max 250 chars, must start with http:// or https://)
  - name: mode
    location: body
    type: string
    required: true
    description: 'Auth mode: `connect` (link to existing account) or `sign-in`'
