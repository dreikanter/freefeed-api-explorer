  parameters:
  - name: username
    location: path
    type: string
    required: true
    description: Username
  - name: year
    location: path
    type: integer
    required: true
    description: Year (e.g. 2024)
  - name: tz
    location: query
    type: string
    required: false
    description: IANA timezone (e.g. `America/New_York`)
