- method: POST
  path: /v2/groups/sudo
  description: Perform privileged operation (admin)
  auth_required: true
  scopes:
  - session-only
  parameters: []
- method: GET
  path: /v2/hashtags/sparseMatches
  description: Search hashtags by prefix (autocomplete).
  auth_required: true
  scopes:
  - read-users-info
  parameters:
  - name: qs
    location: query
    type: string
    required: false
    description: Search query
- method: POST
  path: /v2/invitations
  description: Create a new invitation.
  auth_required: true
  scopes:
  - session-only
  parameters:
  - name: message
    location: body
    type: string
    required: true
    description: Invitation message (non-empty)
  - name: lang
    location: body
    type: string
    required: true
    description: Language code (non-empty)
  - name: singleUse
    location: body
    type: boolean
    required: true
    description: Whether invitation can only be used once
  - name: users
    location: body
    type: string[]
    required: false
    description: Usernames to recommend following
  - name: groups
    location: body
    type: string[]
    required: false
    description: Group names to recommend joining
- method: GET
  path: /v2/invitations/:secureId
  description: Get invitation details by secure ID.
  auth_required: false
  scopes:
  - session-only
  parameters:
  - name: secureId
    location: path
    type: string
    required: true
    description: Invitation secure ID
- method: GET
  path: /v2/invitations/info
  description: Get invitation creation limits and info for current user.
  auth_required: true
  scopes:
  - session-only
  parameters: []
- method: GET
  path: /v2/managedGroups
  description: Get groups managed by current user.
  auth_required: true
  scopes:
  - read-my-info
  parameters: []
- method: GET
  path: /v2/notifications
  description: Get notifications for current user.
  auth_required: true
  scopes:
  - manage-notifications
  parameters:
  - name: offset
    location: query
    type: integer
    required: false
    description: 'Number to skip (default: 0)'
  - name: limit
    location: query
    type: integer
    required: false
    description: 'Max to return (default: 30)'
  - name: filter
    location: query
    type: string or string[]
    required: false
    description: 'Event type filter: `mentions`, `comments`, `bans`, `subscriptions`,
      `groups`, `directs`'
  - name: startDate
    location: query
    type: string
    required: false
    description: ISO 8601 date/time lower bound
  - name: endDate
    location: query
    type: string
    required: false
    description: ISO 8601 date/time upper bound
- method: GET
  path: /v2/notifications/:notifId
  description: Get a specific notification.
  auth_required: true
  scopes:
  - manage-notifications
  parameters:
  - name: notifId
    location: path
    type: string
    required: true
    description: Notification ID
- method: POST
  path: /v2/passwords
  description: Request password reset email.
  auth_required: false
  scopes:
  - session-only
  parameters:
  - name: email
    location: body
    type: string
    required: true
    description: Account email address
- method: PUT
  path: /v2/passwords/:resetPasswordToken
  description: Reset password using token from email.
  auth_required: false
  scopes:
  - session-only
  parameters:
  - name: resetPasswordToken
    location: path
    type: string
    required: true
    description: Token from reset email
  - name: newPassword
    location: body
    type: string
    required: true
    description: New password
  - name: passwordConfirmation
    location: body
    type: string
    required: true
    description: Must match newPassword
- method: POST
  path: /v2/posts
  description: Create a new post.
  auth_required: true
  scopes:
  - manage-posts
  parameters:
  - name: post.body
    location: body
    type: string
    required: true
    description: Post text content
  - name: post.attachments
    location: body
    type: UUID[]
    required: false
    description: 'Attachment IDs (default: [])'
  - name: meta.feeds
    location: body
    type: string or string[]
    required: true
    description: Destination feed names (accountName)
  - name: meta.commentsDisabled
    location: body
    type: boolean
    required: false
    description: 'Disable comments (default: false)'
- method: GET
  path: /v2/posts-opengraph/:postId
  description: Get OpenGraph metadata for a post (used for link previews).
  auth_required: true
  scopes:
  - session-only
  parameters:
  - name: postId
    location: path
    type: UUID
    required: true
    description: Post ID
- method: GET
  path: /v2/posts/:postId
  description: Get a single post with comments and likes.
  auth_required: true
  scopes:
  - read-feeds
  - manage-posts
  parameters:
  - name: postId
    location: path
    type: UUID
    required: true
    description: Post ID
  - name: maxComments
    location: query
    type: number
    required: false
    description: Max comments to include in response
  - name: maxLikes
    location: query
    type: number
    required: false
    description: Max likes to include in response
- method: PUT
  path: /v2/posts/:postId
  description: Update an existing post.
  auth_required: true
  scopes:
  - manage-posts
  parameters:
  - name: postId
    location: path
    type: UUID
    required: true
    description: Post ID
  - name: post.body
    location: body
    type: string
    required: false
    description: Updated post text
  - name: post.attachments
    location: body
    type: UUID[]
    required: false
    description: Updated attachment IDs
  - name: post.feeds
    location: body
    type: string[]
    required: false
    description: Updated destination feed names
- method: DELETE
  path: /v2/posts/:postId
  description: Delete a post.
  auth_required: true
  scopes:
  - manage-posts
  parameters:
  - name: postId
    location: path
    type: UUID
    required: true
    description: Post ID
  - name: fromFeed
    location: query
    type: string or string[]
    required: false
    description: Only remove from specific feed(s), not delete entirely
- method: GET
  path: /v2/posts/:postId/backlinks
  description: Get posts that link to this post.
  auth_required: true
  scopes:
  - read-feeds
  parameters:
  - name: postId
    location: path
    type: UUID
    required: true
    description: Post ID
- method: GET
  path: /v2/posts/:postId/comments/:seqNumber
  description: Get a comment by its sequence number within a post.
  auth_required: true
  scopes:
  - read-feeds
  parameters:
  - name: postId
    location: path
    type: string
    required: true
    description: Post ID (UUID or short ID)
  - name: seqNumber
    location: path
    type: integer
    required: true
    description: Comment sequence number (1-based)
- method: GET
  path: /v2/posts/:postId/comments/id/:commentId
  description: Get a comment by post ID and comment ID.
  auth_required: true
  scopes:
  - read-feeds
  parameters:
  - name: postId
    location: path
    type: string
    required: true
    description: Post ID (UUID or short ID)
  - name: commentId
    location: path
    type: string
    required: true
    description: Comment ID (UUID or short ID)
- method: POST
  path: /v2/posts/:postId/disableComments
  description: Disable comments on your post.
  auth_required: true
  scopes:
  - manage-posts
  parameters:
  - name: postId
    location: path
    type: UUID
    required: true
    description: Post ID
- method: POST
  path: /v2/posts/:postId/enableComments
  description: Re-enable comments on your post.
  auth_required: true
  scopes:
  - manage-posts
  parameters:
  - name: postId
    location: path
    type: UUID
    required: true
    description: Post ID
- method: POST
  path: /v2/posts/:postId/hide
  description: Hide a post from your feed.
  auth_required: true
  scopes:
  - manage-my-feeds
  parameters:
  - name: postId
    location: path
    type: UUID
    required: true
    description: Post ID
- method: POST
  path: /v2/posts/:postId/leave
  description: Leave a direct message conversation.
  auth_required: true
  scopes:
  - manage-posts
  parameters:
  - name: postId
    location: path
    type: UUID
    required: true
    description: Post ID
- method: POST
  path: /v2/posts/:postId/like
  description: Like a post.
  auth_required: true
  scopes:
  - manage-posts
  parameters:
  - name: postId
    location: path
    type: UUID
    required: true
    description: Post ID
- method: POST
  path: /v2/posts/:postId/notifyOfAllComments
  description: Toggle notifications for all comments on a post.
  auth_required: true
  scopes:
  - manage-notifications
  - manage-posts
  parameters:
  - name: postId
    location: path
    type: UUID
    required: true
    description: Post ID
  - name: enabled
    location: body
    type: boolean
    required: true
    description: Enable or disable notifications
- method: POST
  path: /v2/posts/:postId/pin
  description: Pin a post to a user or group feed.
  auth_required: true
  scopes:
  - manage-posts
  parameters:
  - name: postId
    location: path
    type: UUID
    required: true
    description: Post ID
  - name: target
    location: body
    type: string
    required: false
    description: Target accountName (defaults to current user)
- method: POST
  path: /v2/posts/:postId/save
  description: Save a post to your saved posts.
  auth_required: true
  scopes:
  - manage-my-feeds
  parameters:
  - name: postId
    location: path
    type: UUID
    required: true
    description: Post ID
- method: DELETE
  path: /v2/posts/:postId/save
  description: Remove a post from saved posts.
  auth_required: true
  scopes:
  - manage-my-feeds
  parameters:
  - name: postId
    location: path
    type: UUID
    required: true
    description: Post ID
- method: GET
  path: /v2/posts/:postId/translated-body
  description: Get machine-translated post body.
  auth_required: true
  scopes:
  - read-feeds
  parameters:
  - name: postId
    location: path
    type: UUID
    required: true
    description: Post ID
  - name: lang
    location: query
    type: string
    required: false
    description: Target language code (defaults to Accept-Language header)
- method: POST
  path: /v2/posts/:postId/unhide
  description: Unhide a previously hidden post.
  auth_required: true
  scopes:
  - manage-my-feeds
  parameters:
  - name: postId
    location: path
    type: UUID
    required: true
    description: Post ID
- method: POST
  path: /v2/posts/:postId/unlike
  description: Remove like from a post.
  auth_required: true
  scopes:
  - manage-posts
  parameters:
  - name: postId
    location: path
    type: UUID
    required: true
    description: Post ID
- method: POST
  path: /v2/posts/:postId/unpin
  description: Unpin a post.
  auth_required: true
  scopes:
  - manage-posts
  parameters:
  - name: postId
    location: path
    type: UUID
    required: true
    description: Post ID
  - name: target
    location: body
    type: string
    required: false
    description: Target accountName (defaults to current user)
- method: POST
  path: /v2/posts/byIds
  description: Get multiple posts by their IDs.
  auth_required: true
  scopes:
  - read-feeds
  parameters:
  - name: postIds
    location: body
    type: UUID[]
    required: true
    description: Array of post IDs (max 100, unique)
  - name: maxComments
    location: query
    type: number
    required: false
    description: Max comments per post
  - name: maxLikes
    location: query
    type: number
    required: false
    description: Max likes per post
- method: POST
  path: /v2/requests/:followedUserName/revoke
  description: Revoke own outgoing subscription request.
  auth_required: true
  scopes:
  - manage-my-feeds
  parameters:
  - name: followedUserName
    location: path
    type: string
    required: true
    description: Username of user whose request to revoke
- method: GET
  path: /v2/search
  description: Search posts and comments.
  auth_required: true
  scopes:
  - read-feeds
  parameters:
  - name: qs
    location: query
    type: string
    required: false
    description: Search query string
  - name: offset
    location: query
    type: integer
    required: false
    description: 'Number of results to skip (default: 0)'
  - name: limit
    location: query
    type: integer
    required: false
    description: 'Max results to return (default: 30, max: 120)'
  - name: sort
    location: query
    type: string
    required: false
    description: 'Sort order: `created` or `updated` (default: `updated`)'
- method: GET
  path: /v2/server-info
  description: Get server configuration info (text limits, supported features, etc.).
  auth_required: false
  scopes:
  - any
  parameters: []
- method: POST
  path: /v2/session
  description: Create session (sign in).
  auth_required: false
  scopes:
  - session-only
  parameters:
  - name: username
    location: body
    type: string
    required: true
    description: Username
  - name: password
    location: body
    type: string
    required: true
    description: Password
- method: DELETE
  path: /v2/session
  description: Close current session (sign out).
  auth_required: true
  scopes:
  - session-only
  parameters: []
- method: GET
  path: /v2/session/list
  description: List active sessions.
  auth_required: true
  scopes:
  - session-only
  parameters: []
- method: PATCH
  path: /v2/session/list
  description: Close specific sessions.
  auth_required: true
  scopes:
  - session-only
  parameters:
  - name: close
    location: body
    type: UUID[]
    required: false
    description: 'Session IDs to close (default: [])'
- method: POST
  path: /v2/session/reissue
  description: Reissue session token.
  auth_required: true
  scopes:
  - session-only
  parameters: []
- method: GET
  path: /v2/stats
  description: Get site-wide statistics.
  auth_required: false
  scopes:
  - session-only
  parameters:
  - name: data
    location: query
    type: string
    required: false
    description: 'Data type (default: `users`)'
  - name: start_date
    location: query
    type: string
    required: false
    description: 'Start date (min: 2015-05-04, FreeFeed launch date)'
  - name: end_date
    location: query
    type: string
    required: false
    description: 'End date (max: today)'
- method: GET
  path: /v2/summary/:days
  description: Get general site summary (most popular posts).
  auth_required: true
  scopes:
  - read-feeds
  parameters:
  - name: days
    location: path
    type: integer
    required: true
    description: Number of days to summarize (1-30)
  - name: limit
    location: query
    type: integer
    required: false
    description: Max posts to return
- method: GET
  path: /v2/summary/:username/:days
  description: Get user-specific summary.
  auth_required: true
  scopes:
  - read-feeds
  parameters:
  - name: username
    location: path
    type: string
    required: true
    description: Username
  - name: days
    location: path
    type: integer
    required: true
    description: Number of days to summarize (1-30)
- method: GET
  path: /v2/timelines-metatags/:username
  description: Get HTML meta tags for a user's timeline (for embedding/SEO).
  auth_required: true
  scopes:
  - session-only
  parameters:
  - name: username
    location: path
    type: string
    required: true
    description: Username
- method: GET
  path: /v2/timelines-rss/:username
  description: Get RSS feed for a user's posts.
  auth_required: true
  scopes:
  - read-feeds
  parameters:
  - name: username
    location: path
    type: string
    required: true
    description: Username
- method: GET
  path: /v2/timelines/:username
  description: Get a user's posts timeline.
  auth_required: true
  scopes:
  - read-feeds
  parameters:
  - name: username
    location: path
    type: string
    required: true
    description: Username
- method: GET
  path: /v2/timelines/:username/comments
  description: Get posts commented on by user.
  auth_required: true
  scopes:
  - read-feeds
  parameters:
  - name: username
    location: path
    type: string
    required: true
    description: Username
- method: GET
  path: /v2/timelines/:username/likes
  description: Get posts liked by user.
  auth_required: true
  scopes:
  - read-feeds
  parameters:
  - name: username
    location: path
    type: string
    required: true
    description: Username
- method: GET
  path: /v2/timelines/filter/directs
  description: Get direct messages.
  auth_required: true
  scopes:
  - read-feeds
  parameters: []
- method: GET
  path: /v2/timelines/filter/discussions
  description: Get posts you've participated in (commented or liked).
  auth_required: true
  scopes:
  - read-feeds
  parameters: []
- method: GET
  path: /v2/timelines/filter/saves
  description: Get saved posts.
  auth_required: true
  scopes:
  - read-feeds
  parameters: []
- method: GET
  path: /v2/timelines/home
  description: Get home feed (River of News) with local bumps.
  auth_required: true
  scopes:
  - read-feeds
  parameters: []
- method: POST
  path: /v2/timelines/home
  description: Create a new custom home feed.
  auth_required: true
  scopes:
  - manage-my-feeds
  parameters:
  - name: title
    location: body
    type: string
    required: true
    description: Feed title (1-250 chars, must contain non-whitespace)
  - name: subscribedTo
    location: body
    type: UUID[]
    required: false
    description: 'User/group IDs to include (default: [])'
- method: PATCH
  path: /v2/timelines/home
  description: Reorder home feeds.
  auth_required: true
  scopes:
  - manage-my-feeds
  parameters:
  - name: reorder
    location: body
    type: UUID[]
    required: true
    description: Ordered list of feed IDs (min 1, unique)
- method: GET
  path: /v2/timelines/home/:feedId
  description: Get info about a specific home feed.
  auth_required: true
  scopes:
  - manage-my-feeds
  parameters:
  - name: feedId
    location: path
    type: UUID
    required: true
    description: Home feed ID
- method: PATCH
  path: /v2/timelines/home/:feedId
  description: Update a home feed.
  auth_required: true
  scopes:
  - manage-my-feeds
  parameters:
  - name: feedId
    location: path
    type: UUID
    required: true
    description: Home feed ID
  - name: title
    location: body
    type: string
    required: false
    description: Updated title (1-250 chars)
  - name: subscribedTo
    location: body
    type: UUID[]
    required: false
    description: Updated subscription list
- method: DELETE
  path: /v2/timelines/home/:feedId
  description: Delete a home feed.
  auth_required: true
  scopes:
  - manage-my-feeds
  parameters:
  - name: feedId
    location: path
    type: UUID
    required: true
    description: Home feed ID to delete
  - name: backupFeed
    location: body
    type: UUID
    required: false
    description: Feed ID to move subscriptions to
- method: GET
  path: /v2/timelines/home/:feedId/posts
  description: Get posts from a specific custom home feed.
  auth_required: true
  scopes:
  - read-feeds
  parameters:
  - name: feedId
    location: path
    type: UUID
    required: true
    description: Home feed ID
- method: GET
  path: /v2/timelines/home/list
  description: List all home feeds for current user.
  auth_required: true
  scopes:
  - read-my-info
  - read-feeds
  parameters: []
- method: GET
  path: /v2/timelines/home/subscriptions
  description: List all subscription assignments to home feeds.
  auth_required: true
  scopes:
  - manage-my-feeds
  parameters: []
- method: POST
  path: /v2/undo/:subject
  description: Undo a recent action (post/comment deletion).
  auth_required: true
  scopes:
  - manage-posts
  parameters:
  - name: subject
    location: path
    type: string
    required: true
    description: 'Action type: `post-delete` or `comment-delete`'
  - name: token
    location: body
    type: string
    required: true
    description: JWT undo token (received in delete response)
- method: POST
  path: /v2/users
  description: Create new user account.
  auth_required: false
  scopes:
  - session-only
  parameters:
  - name: username
    location: body
    type: string
    required: true
    description: Username (3-25 alphanumeric)
  - name: screenName
    location: body
    type: string
    required: false
    description: Display name
  - name: email
    location: body
    type: string
    required: false
    description: Email (required if email verification enabled)
  - name: password
    location: body
    type: string
    required: false
    description: Password (required unless externalProfileKey provided)
  - name: captcha
    location: body
    type: string
    required: false
    description: reCAPTCHA token (required if captcha enabled)
  - name: invitation
    location: body
    type: string
    required: false
    description: Invitation code
  - name: cancel_subscription
    location: body
    type: boolean
    required: false
    description: 'Cancel default subscription (default: false)'
  - name: externalProfileKey
    location: body
    type: string
    required: false
    description: External auth profile key
  - name: emailVerificationCode
    location: body
    type: string
    required: false
    description: Email verification code
  - name: profilePictureURL
    location: body
    type: string
    required: false
    description: Profile picture URL (must start with http:// or https://)
  - name: isPrivate
    location: body
    type: boolean
    required: false
    description: 'Make feed private (default: false)'
  - name: isProtected
    location: body
    type: boolean
    required: false
    description: 'Make feed protected (default: false)'
- method: PUT
  path: /v2/users/:userId
  description: Update user or group profile. Delegates to user or group controller
    based on feed type.
  auth_required: true
  scopes:
  - manage-profile
  parameters:
  - name: userId
    location: path
    type: UUID
    required: true
    description: User or group ID
  - name: user.screenName
    location: body
    type: string
    required: false
    description: Display name
  - name: user.isPrivate
    location: body
    type: boolean
    required: false
    description: Private feed
  - name: user.isProtected
    location: body
    type: boolean
    required: false
    description: Protected feed
  - name: user.description
    location: body
    type: string
    required: false
    description: Profile description
  - name: user.frontendPreferences
    location: body
    type: object
    required: false
    description: Frontend display preferences
  - name: user.preferences
    location: body
    type: object
    required: false
    description: User preferences (see Preferences)
  - name: user.email
    location: body
    type: string
    required: false
    description: Email (full-access tokens only)
  - name: emailVerificationCode
    location: body
    type: string
    required: false
    description: Required when changing email
- method: GET
  path: /v2/users/:username
  description: Get user profile.
  auth_required: true
  scopes:
  - read-users-info
  parameters:
  - name: username
    location: path
    type: string
    required: true
    description: Username
- method: POST
  path: /v2/users/:username/ban
  description: Ban a user.
  auth_required: true
  scopes:
  - manage-my-feeds
  parameters:
  - name: username
    location: path
    type: string
    required: true
    description: Username to ban
- method: POST
  path: /v2/users/:username/sendRequest
  description: Send subscription request to private user or group.
