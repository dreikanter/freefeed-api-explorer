name: Deploy to Staging (dev.explorer.frf.im)

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: 'staging-${{ github.ref }}'
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: npm run check

      - name: Run linter
        run: npm run lint

      - name: Build application
        run: npm run build
        env:
          PUBLIC_ENVIRONMENT: staging

      - name: Deploy to staging repository
        uses: peaceiris/actions-gh-pages@v3
        if: github.event_name == 'push'
        with:
          deploy_key: ${{ secrets.STAGING_DEPLOY_KEY }}
          external_repository: your-username/freefeed-api-explorer-staging
          publish_dir: ./build
          publish_branch: main
          cname: dev.explorer.frf.im