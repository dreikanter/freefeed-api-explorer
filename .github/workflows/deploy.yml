name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages-${{ github.repository }}'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      domain: ${{ steps.env.outputs.domain }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: npm run check

      - name: Run linter
        run: npm run lint

      - name: Detect environment
        id: env
        run: |
          if [[ "${{ github.repository }}" == *"-staging" ]]; then
            echo "environment=staging" >> $GITHUB_OUTPUT
            echo "domain=dev.explorer.frf.im" >> $GITHUB_OUTPUT
          else
            echo "environment=production" >> $GITHUB_OUTPUT
            echo "domain=explorer.frf.im" >> $GITHUB_OUTPUT
          fi

      - name: Build application
        run: npm run build
        env:
          PUBLIC_ENVIRONMENT: ${{ steps.env.outputs.environment }}

      - name: Setup Pages
        uses: actions/configure-pages@v4
        if: github.event_name == 'push'

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './build'
        if: github.event_name == 'push'

  deploy:
    environment:
      name: github-pages
      url: https://${{ needs.build.outputs.domain }}
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4