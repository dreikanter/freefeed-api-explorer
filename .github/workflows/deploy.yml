name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request: # remove fter testing
    branches: [main]

permissions:
  contents: read # allows the workflow to read the repository (default)
  pages: write # allows the workflow to deploy to GitHub Pages
  id-token: write # enables OIDC authentication for secure deployments

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: npm run check

      - name: Run linter
        run: npm run lint

      - name: Detect environment
        id: env
        run: |
          if [[ "${{ github.repository }}" == *"-staging" ]]; then
            echo "environment=staging" >> $GITHUB_OUTPUT
          else
            echo "environment=production" >> $GITHUB_OUTPUT
          fi

      - name: Build application
        run: npm run build
        env:
          PUBLIC_ENVIRONMENT: ${{ steps.env.outputs.environment }}

      - name: Setup Pages
        uses: actions/configure-pages@v4
        if: github.event_name == 'push'

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './build'
        if: github.event_name == 'push'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }} # shows a clickable link
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
