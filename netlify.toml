[build]
  publish = "build"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"

# Production branch (main) settings
[context.production]
  command = "PUBLIC_ENVIRONMENT=production npm run build"

# Dev branch settings
[context.dev]
  command = "PUBLIC_ENVIRONMENT=staging npm run build"

# Pull request previews
[context.deploy-preview]
  command = "PUBLIC_ENVIRONMENT=preview npm run build"

# Branch deploys (any other branch)
[context.branch-deploy]
  command = "PUBLIC_ENVIRONMENT=staging npm run build"

# SPA routing - handle client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200