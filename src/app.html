<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FreeFeed API Explorer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet" />
    <style>
      /* Ensure last sidebar list item has a bottom border and no rounding */
      .scrollable-column .list-group-flush .list-group-item:last-child {
        border-bottom: var(--bs-border-width) solid var(--bs-border-color);
        border-radius: 0;
      }

      /* Full-height layout: navbar + scrollable columns fill the viewport */
      html, body, main {
        height: 100dvh;
        margin: 0;
      }

      main {
        display: flex;
        flex-direction: column;
      }

      /* Lock scrolling only when the page uses split-layout */
      main:has(.split-layout) {
        overflow: hidden;
      }

      /* Two-column split layout */
      .split-layout {
        display: flex;
        flex: 1;
        min-height: 0;
      }

      .split-sidebar {
        flex-shrink: 0;
        width: 33.333%;
      }

      .split-main {
        flex: 1;
        min-width: 0;
      }

      .scrollable-column {
        height: 100%;
        overflow-y: auto;
        padding-bottom: 2rem;
      }

      /* Responsive: stack columns on mobile */
      @media (max-width: 767.98px) {
        .split-layout {
          flex-direction: column;
        }

        .split-sidebar {
          width: auto;
        }

        .hide-below-md {
          display: none;
        }
      }

      @media (min-width: 768px) {
        .show-below-md {
          display: none;
        }
      }
    </style>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover" style="visibility: hidden">
    <div style="display: contents">%sveltekit.body%</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      // Prevent FOUC by showing body after styles load
      document.addEventListener('DOMContentLoaded', function () {
        document.body.style.visibility = 'visible';
      });
      // Fallback: show after a short delay regardless
      setTimeout(function () {
        document.body.style.visibility = 'visible';
      }, 100);
    </script>
  </body>
</html>
